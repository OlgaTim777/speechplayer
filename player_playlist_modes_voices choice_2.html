<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Voice Pro - Ultra Auto-Fit</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00d2ff; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; background: var(--bg); overflow: hidden; }
        .sidebar { width: 450px; background: #fff; border-right: 1px solid #ddd; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        h2 { font-size: 11px; margin: 5px 0; color: #333; border-bottom: 2px solid var(--accent); padding-bottom: 3px; text-transform: uppercase; }
        .group { background: #fdfdfd; padding: 10px; border-radius: 8px; border: 1px solid #eee; margin-bottom: 5px; }
        label { display: block; font-size: 9px; font-weight: 700; color: #666; margin-bottom: 2px; }
        input, select { width: 100%; padding: 4px; border: 1px solid #ccc; border-radius: 4px; font-size: 11px; margin-bottom: 5px; box-sizing: border-box; }
        input[type="checkbox"] { width: auto; margin-right: 5px; }
        .row { display: flex; gap: 6px; align-items: flex-end; } .row > div { flex: 1; }
        .main { flex: 1; display: flex; flex-direction: column; padding: 20px; gap: 15px; background: #e2e8f0; }
        .preview-box { flex: 2; background: white; border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; border: 1px solid #cbd5e1; overflow: hidden; }
        .code-box { height: 90px; background: #1e1e1e; border-radius: 10px; padding: 10px; position: relative; }
        #code-res { width: 100%; height: 100%; background: transparent; color: #9cdcfe; border: none; font-family: monospace; font-size: 10px; resize: none; outline: none; }
        .btn-copy { position: absolute; top: 10px; right: 10px; background: #10b981; color: #fff; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>1. Основа и Голос</h2>
    <div class="group">
        <label>JSON URL (Raw):</label>
        <input type="text" id="p-url" value="https://raw.githubusercontent.com/OlgaTim777/speechplayer/main/playlist.json" onchange="liveUpdate()">
        <div class="row">
            <div>
                <label>Голос:</label>
                <select id="p-voice" onchange="liveUpdate()">
                    <option value="female">Женский (Natural)</option>
                    <option value="male">Мужской (Deep)</option>
                    <option value="child">Детский (Bright)</option>
                </select>
            </div>
            <div><label>Ширина гаджета:</label><input type="number" id="p-gw" value="600" oninput="liveUpdate()"></div>
        </div>
        <input type="file" id="p-img" accept="image/*" onchange="loadImg(this)">
    </div>

    <h2>2. Текст (Smart Auto-Fit)</h2>
    <div class="group">
        <div class="row">
            <div><label>Шрифт:</label><input type="text" id="p-tf" value="Montserrat" oninput="liveUpdate()"></div>
            <div><label>Макс. размер:</label><input type="number" id="p-fs" value="28" oninput="liveUpdate()"></div>
        </div>
        <div class="row">
            <div><label>Цвет текста:</label><input type="color" id="p-tc" value="#333333" oninput="liveUpdate()"></div>
            <div><label>Highlight:</label><input type="color" id="p-hl" value="#ff0000" oninput="liveUpdate()"></div>
        </div>
        <div class="row">
            <div><label>Ширина %:</label><input type="number" id="p-tw" value="85" oninput="liveUpdate()"></div>
            <div><label>X %:</label><input type="number" id="p-px" value="0" oninput="liveUpdate()"></div>
            <div><label>Y %:</label><input type="number" id="p-py" value="-5" oninput="liveUpdate()"></div>
        </div>
    </div>

    <h2>3. Кнопки режимов</h2>
    <div class="group">
        <div class="row">
            <div><label>Размер шрифта:</label><input type="number" id="p-mfs" value="14" oninput="liveUpdate()"></div>
            <div style="padding-bottom:10px;"><input type="checkbox" id="p-mbold" checked onchange="liveUpdate()"><label style="display:inline">Bold</label></div>
        </div>
        <div class="row">
            <div><label>Study:</label><input type="color" id="p-c1" value="#10b981" oninput="liveUpdate()"></div>
            <div><label>Prac:</label><input type="color" id="p-c2" value="#f59e0b" oninput="liveUpdate()"></div>
            <div><label>Train:</label><input type="color" id="p-c3" value="#3b82f6" oninput="liveUpdate()"></div>
        </div>
        <div class="row">
            <div><label>X %:</label><input type="number" id="p-bx" value="0" oninput="liveUpdate()"></div>
            <div><label>Y %:</label><input type="number" id="p-by" value="20" oninput="liveUpdate()"></div>
        </div>
    </div>

    <h2>4. Список и Управление</h2>
    <div class="group">
        <div class="row">
            <div><label>Цвет иконок:</label><input type="color" id="p-cc" value="#333333" oninput="liveUpdate()"></div>
            <div><label>Ширина списка %:</label><input type="number" id="p-lw" value="50" oninput="liveUpdate()"></div>
        </div>
        <div class="row">
            <div><label>X списка %:</label><input type="number" id="p-lx" value="0" oninput="liveUpdate()"></div>
            <div><label>Y списка %:</label><input type="number" id="p-ly" value="-40" oninput="liveUpdate()"></div>
        </div>
        <div class="row">
            <div><label>X кнопок %:</label><input type="number" id="p-cx" value="0" oninput="liveUpdate()"></div>
            <div><label>Y кнопок %:</label><input type="number" id="p-cy" value="40" oninput="liveUpdate()"></div>
        </div>
    </div>
</div>

<div class="main">
    <div class="preview-box" id="pv-container"></div>
    <div class="code-box">
        <button class="btn-copy" onclick="copyCode()">Copy Code</button>
        <textarea id="code-res" readonly></textarea>
    </div>
</div>

<script>
    let imgData = '';
    function loadImg(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { imgData = e.target.result; fullReload(); };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function getCfg() {
        const ids = ['p-gw','p-fs','p-tc','p-hl','p-px','p-py','p-c1','p-c2','p-c3','p-url','p-bx','p-by','p-tf','p-mfs','p-cc','p-mbold','p-tw','p-lw','p-lx','p-ly','p-voice','p-cx','p-cy'];
        let c = {}; 
        ids.forEach(id => { 
            const el = document.getElementById(id); 
            if(el) c[id.replace('p-','')] = el.type === 'checkbox' ? el.checked : el.value; 
        });
        c.cw = 70;
        return c;
    }

    function fullReload() {
        const c = getCfg();
        const bgStyle = imgData ? `background-image:url(${imgData});background-size:100% 100%;` : `background:#f8fafc;border:2px dashed #ccc;`;
        
        const content = `<!DOCTYPE html><html><head>
<link href='https://fonts.googleapis.com/css2?family=${c.tf.replace(/ /g, "+")}:wght@400;700&display=swap' rel='stylesheet'>
<style>
body{margin:0;display:flex;justify-content:center;align-items:center;height:100vh;background:transparent;overflow:hidden;}
#w{position:relative;width:${c.gw}px;aspect-ratio:1.6;${bgStyle}}
#plist-ui{position:absolute;width:${c.lw}%;left:calc(50% + ${c.lx}%);top:calc(50% + ${c.ly}%);transform:translate(-50%,-50%);z-index:110;}
#plist-sel{width:100%;padding:4px;border-radius:6px;border:1px solid rgba(0,0,0,0.1);font-family:sans-serif;font-size:11px;background:white;cursor:pointer;}
#s{position:absolute;width:${c.tw}%;height:40%;left:calc(50% + ${c.px}%);top:calc(50% + ${c.py}%);transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;padding:10px;box-sizing:border-box;}
#t{color:${c.tc};font-size:${c.fs}px;width:100%;line-height:1.2;font-family:'${c.tf}',sans-serif;font-weight:700;pointer-events:none;}
.itm{display:inline-block;margin:0 3px;} .a{color:${c.hl}!important;}
#modes{position:absolute;width:90%;left:calc(50% + ${c.bx}%);top:calc(50% + ${c.by}%);transform:translate(-50%,-50%);display:flex;gap:15px;justify-content:center;}
.m-btn{background:none;border:none;cursor:pointer;font-family:'${c.tf}',sans-serif;font-size:${c.mfs}px;font-weight:${c.mbold?'bold':'normal'};padding:5px;}
#b-s{color:${c.c1};} #b-p{color:${c.c2};} #b-t{color:${c.c3};}
.m-btn.act{text-decoration:underline;text-underline-offset:5px;}
#ctrl{position:absolute;width:${c.cw}%;left:calc(50% + ${c.cx}%);top:calc(50% + ${c.cy}%);transform:translateX(-50%);display:flex;align-items:center;justify-content:center;gap:15px;color:${c.cc};}
#ctrl button{background:none;border:none;cursor:pointer;font-size:24px;color:inherit;}
input[type=range]{cursor:pointer;accent-color:${c.hl};width:80px;}</style></head><body>
<div id='w'>
    <div id='plist-ui'><select id='plist-sel' onchange='window.loadL(this.value)'><option>Loading...</option></select></div>
    <div id='s'><div id='t'></div></div>
    <div id='modes'>
        <button id='b-s' class='m-btn act' onclick='window.setM("study")'>Study</button>
        <button id='b-p' class='m-btn' onclick='window.setM("practice")'>Practice</button>
        <button id='b-t' class='m-btn' onclick='window.setM("train")'>Training</button>
    </div>
    <div id='ctrl'>
        <button onclick='window.p()'>▶</button><button onclick='window.pa()'>II</button><button onclick='window.st()'>■</button>
        <input type='range' id='seek' value='0' min='0' step='1' oninput='window.sk(this.value)'>
        <span>🔊</span><input type='range' id='vol' value='1' min='0' max='1' step='0.1' oninput='window.vM(this.value)'>
    </div>
</div>
<script>
(function(){
    let sy=window.speechSynthesis, curr=0, vL=1, mode="study", isP=false, playlist=[], groups=[], allWords=[];
    const box=document.getElementById("t"), cont=document.getElementById("s"), seek=document.getElementById("seek"), sel=document.getElementById("plist-sel");
    const vType = "${c.voice}", baseFS = ${c.fs};

    function autoFit() {
        let size = baseFS;
        box.style.fontSize = size + "px";
        // Цикл подгонки с небольшим запасом
        for (let i = 0; i < 30; i++) {
            if (box.offsetHeight > cont.offsetHeight || box.offsetWidth > cont.offsetWidth) {
                size -= 1;
                box.style.fontSize = size + "px";
            } else { break; }
        }
    }

    window.loadL = (idx) => { if(!playlist[idx]) return; window.st(); build(playlist[idx].text); };
    async function fetchList(){
        try {
            const r = await fetch("${c.url}");
            playlist = await r.json();
            sel.innerHTML = playlist.map((item, i) => "<option value='"+i+"'>"+item.title+"</option>").join("");
            window.loadL(0);
        } catch(e) { sel.innerHTML = "<option>JSON Error</option>"; }
    }
    function build(txt){
        allWords = txt.replace(/\\n/g, " ").split(/\\s+/).filter(x=>x.length>0);
        box.innerHTML = allWords.map((w,i)=>"<span class='itm' data-id='"+i+"'>"+w+"</span>").join(" ");
        // Даем браузеру время на отрисовку
        setTimeout(autoFit, 50);
        groups = (mode==="study") ? allWords.map((w,i)=>[i]) : (mode==="practice" ? getGrps(allWords) : [allWords.map((w,i)=>i)]);
        seek.max = (mode==="train") ? 0 : groups.length - 1;
    }
    function getGrps(ws){
        const mk=["with","and","but","in","on","at","for","of","from","to","is","a","the"];
        let res=[], cur=[];
        ws.forEach((w, i)=>{ cur.push(i); if(w.match(/[,.!?;:|—–]/) || (i < ws.length-1 && mk.includes(ws[i+1].toLowerCase()))) { res.push(cur); cur=[]; } });
        if(cur.length) res.push(cur); return res.filter(g=>g.length);
    }
    window.setM = (m) => { mode=m; window.st(); const idx=sel.value; if(playlist[idx]) build(playlist[idx].text); 
        ["b-s","b-p","b-t"].forEach(id=>document.getElementById(id).classList.toggle("act",id==="b-"+m[0])); };
    window.st = () => { sy.cancel(); curr=0; isP=false; clr(); seek.value=0; };
    window.pa = () => { sy.pause(); isP=true; };
    window.vM = (v) => { vL=v; };
    window.sk = (v) => { if(mode==="train") return; window.st(); curr=parseInt(v); hlt(curr); };
    window.p = () => { if(sy.speaking && isP){ sy.resume(); isP=false; return; } if(sy.speaking) return; loop(curr); };
    function clr(){ document.querySelectorAll(".itm").forEach(s=>s.classList.remove("a")); }
    function hlt(idx){
        clr(); if(groups[idx]) groups[idx].forEach(id=>{ const el=document.querySelector("[data-id='"+id+"']"); if(el) el.classList.add("a"); });
        seek.value = idx; curr = idx;
    }
    function loop(idx){
        if(idx >= groups.length && mode !== "train") { setTimeout(window.st, 400); return; }
        const u = new SpeechSynthesisUtterance(mode==="train" ? allWords.join(" ") : groups[idx].map(id=>allWords[id]).join(" "));
        const vs = sy.getVoices();
        if(vType === "male") u.voice = vs.find(v=>v.name.includes("Male") || v.name.includes("David")) || vs[0];
        else u.voice = vs.find(v=>v.name.includes("Female") || v.name.includes("UK English Female") || v.name.includes("Zira")) || vs[0];
        u.pitch = (vType === "child") ? 1.5 : 1.0;
        u.rate = (vType === "child") ? 1.1 : 0.85;
        u.volume = vL;
        if (mode === "train") {
            u.onboundary = (e) => {
                if (e.name === "word") {
                    const txtBefore = allWords.join(" ").substring(0, e.charIndex).trim();
                    const wordIdx = txtBefore === "" ? 0 : txtBefore.split(/\\s+/).length;
                    clr(); const el = document.querySelector("[data-id='"+wordIdx+"']"); if(el) el.classList.add("a");
                }
            };
        } else u.onstart = () => hlt(idx);
        u.onend = () => { if(!isP) { if (mode === "train") setTimeout(window.st, 400); else setTimeout(()=>loop(idx+1), mode==="practice"?700:100); } };
        sy.speak(u);
    }
    if(sy.onvoiceschanged !== undefined) sy.onvoiceschanged = fetchList;
    fetchList();
    window.addEventListener('resize', () => { setTimeout(autoFit, 100); });
})();
<\/script></body></html>`;

        const container = document.getElementById('pv-container');
        container.innerHTML = '';
        const iframe = document.createElement('iframe');
        iframe.style.width = c.gw + 'px';
        iframe.style.height = Math.round(c.gw/1.6) + 'px';
        iframe.style.border = '0';
        iframe.style.transform = `scale(${Math.min(1, (container.offsetWidth - 40) / c.gw)})`;
        iframe.srcdoc = content;
        container.appendChild(iframe);
        document.getElementById('code-res').value = `<iframe width="${c.gw}" height="${Math.round(c.gw/1.6)}" frameborder="0" allow="autoplay" srcdoc='${content.replace(/'/g, "&#39;")}'></iframe>`;
    }

    function liveUpdate() { fullReload(); }
    function copyCode() { 
        document.getElementById('code-res').select(); 
        document.execCommand('copy'); 
        alert('Код скопирован!'); 
    }
    window.onload = () => setTimeout(fullReload, 500);
</script>
</body>
</html>
